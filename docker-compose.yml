services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: miniads-postgres
    environment:
      POSTGRES_USER: miniads
      POSTGRES_PASSWORD: miniads
      POSTGRES_DB: miniads
    ports:
      - "5432:5432"
    volumes:
      - miniads_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniads"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  miniads_pg_data:
